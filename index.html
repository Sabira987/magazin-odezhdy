<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог — админ панель</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F0E4; --cream-2:#EFE7D6; --card:#FFFDF9; --ink:#241F19; --ink-soft:#6b6154; --line:#ddd0b4;
    --women:#BE6E62; --women-soft:#F1DAD5; --men:#4C6685; --men-soft:#DAE3EC; --children:#C99433; --children-soft:#F4E4BE;
    --green:#3F6B52; --red:#B33A2E; --radius:14px; --shadow:0 1px 2px rgba(36,31,25,.06),0 8px 24px -14px rgba(36,31,25,.25);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Inter',sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}
  h1{font-family:'Fraunces',serif;font-size:24px;margin:0 0 4px;}
  p.sub{color:var(--ink-soft);font-size:13px;margin:0 0 22px;}

  /* login gate */
  #gate{max-width:380px;margin:80px auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:var(--shadow);text-align:center;}
  #gate input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin:12px 0;}
  #gate button{width:100%;padding:10px;border:none;border-radius:8px;background:var(--ink);color:var(--cream);font-weight:700;cursor:pointer;font-size:14px;}
  #gate .err{color:var(--red);font-size:12.5px;min-height:18px;}

  .cat-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .cat-tab{border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;background:var(--card);cursor:pointer;text-align:left;box-shadow:var(--shadow);}
  .cat-tab .name{font-family:'Fraunces',serif;font-weight:600;font-size:16px;}
  .cat-tab[data-cat="women"].active{background:var(--women-soft);border-color:var(--women);}
  .cat-tab[data-cat="men"].active{background:var(--men-soft);border-color:var(--men);}
  .cat-tab[data-cat="children"].active{background:var(--children-soft);border-color:var(--children);}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--ink-soft);}
  .chip.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
  .add-btn{border:none;border-radius:999px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;background:var(--ink);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;}
  .stripe{height:5px;}
  .card[data-cat="women"] .stripe{background:var(--women);}
  .card[data-cat="men"] .stripe{background:var(--men);}
  .card[data-cat="children"] .stripe{background:var(--children);}
  .photo-box{position:relative;width:100%;aspect-ratio:4/3;background:var(--cream-2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;border-bottom:1px solid var(--line);font-size:12px;color:var(--ink-soft);}
  .photo-box img{width:100%;height:100%;object-fit:cover;}
  .card-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px;}
  .field label{font-size:10px;text-transform:uppercase;color:var(--ink-soft);font-weight:600;display:block;margin-bottom:3px;}
  .field input,.field select{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13.5px;width:100%;font-family:inherit;}
  .name-row{display:flex;gap:6px;}
  .name-row .field{flex:1;}
  .num-row{display:flex;gap:6px;}
  .num-row .field{flex:1;}
  .price-field input{font-family:'JetBrains Mono',monospace;font-weight:700;}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding-top:8px;border-top:1px dashed var(--line);}
  .sub-select{font-size:11.5px;border:1px solid var(--line);border-radius:6px;padding:3px 6px;}
  .del-btn{border:1px solid var(--line);background:#fff;border-radius:8px;width:28px;height:28px;cursor:pointer;color:var(--ink-soft);}
  .del-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
  .empty{grid-column:1/-1;text-align:center;padding:50px;color:var(--ink-soft);}
  .saved-flag{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:8px 16px;border-radius:999px;font-size:12.5px;opacity:0;transition:.3s;}
  .saved-flag.show{opacity:1;}
</style>
</head>
<body>

<div id="gate">
  <h1>Кіру / Вход</h1>
  <p class="sub">Админ токенін енгізіңіз (серверде ADMIN_TOKEN деп орнатылған)</p>
  <input type="password" id="tokenInput" placeholder="Admin token">
  <button id="loginBtn">Кіру / Войти</button>
  <div class="err" id="gateErr"></div>
</div>

<div class="wrap" id="app" style="display:none;">
  <h1>Киім дүкені — тауар каталогы</h1>
  <p class="sub">Мұнда қосқан тауарлар WhatsApp ботында автоматты көрсетіледі.</p>

  <div class="cat-tabs" id="catTabs"></div>
  <div class="controls">
    <div class="chips" id="subChips"></div>
    <button class="add-btn" id="addBtn">+ Тауар қосу</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="saved-flag" id="savedFlag">Сақталды ✓</div>
<input type="file" id="hiddenPhotoInput" accept="image/*" style="display:none">

<script>
let TOKEN = localStorage.getItem('admin_token') || '';
let META = null;
let PRODUCTS = [];
let state = { cat: 'women', sub: 'all' };
let editingId = null;

const CAT_LABEL = { women:{kz:'Әйелдер'}, men:{kz:'Ерлер'}, children:{kz:'Балалар'} };

async function api(path, opts={}){
  opts.headers = Object.assign({ 'Authorization': 'Bearer ' + TOKEN }, opts.headers || {});
  const res = await fetch(path, opts);
  if(res.status === 401) throw new Error('unauthorized');
  return res;
}

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('tokenInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });

async function tryLogin(){
  TOKEN = document.getElementById('tokenInput').value.trim();
  try{
    const res = await api('/api/products');
    if(!res.ok) throw new Error('bad');
    PRODUCTS = await res.json();
    const metaRes = await api('/api/meta');
    META = await metaRes.json();
    localStorage.setItem('admin_token', TOKEN);
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    renderAll();
  }catch(e){
    document.getElementById('gateErr').textContent = 'Токен қате немесе серверге қосылмады / Неверный токен или нет связи с сервером';
  }
}

if(TOKEN){ tryLogin(); }

function flash(){
  const f = document.getElementById('savedFlag');
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 1000);
}

function renderAll(){
  renderTabs(); renderChips(); renderGrid();
}

function renderTabs(){
  const cats = ['women','men','children'];
  document.getElementById('catTabs').innerHTML = cats.map(c=>{
    const count = PRODUCTS.filter(p=>p.cat===c).length;
    return `<button class="cat-tab ${c===state.cat?'active':''}" data-cat="${c}"><div class="name">${CAT_LABEL[c].kz}</div><div style="font-size:11px;color:var(--ink-soft);">${count} тауар</div></button>`;
  }).join('');
  document.querySelectorAll('.cat-tab').forEach(b=> b.addEventListener('click', ()=>{ state.cat=b.dataset.cat; state.sub='all'; renderAll(); }));
}

function renderChips(){
  const subs = META.SUBCATS[state.cat];
  const chips = [{id:'all', kz:'Барлығы'}, ...subs];
  document.getElementById('subChips').innerHTML = chips.map(s=>`<button class="chip ${state.sub===s.id?'active':''}" data-sub="${s.id}">${s.kz}</button>`).join('');
  document.querySelectorAll('.chip').forEach(c=> c.addEventListener('click', ()=>{ state.sub=c.dataset.sub; renderAll(); }));
}

function escapeHtml(s){ if(s==null) return ''; return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function subOptions(cat, selected){
  return META.SUBCATS[cat].map(s=>`<option value="${s.id}" ${s.id===selected?'selected':''}>${s.kz}</option>`).join('');
}

function renderGrid(){
  let items = PRODUCTS.filter(p=>p.cat===state.cat);
  if(state.sub!=='all') items = items.filter(p=>p.sub===state.sub);
  const grid = document.getElementById('grid');
  if(items.length===0){ grid.innerHTML = `<div class="empty">Бұл санатта тауар жоқ.</div>`; return; }
  grid.innerHTML = items.map(cardTpl).join('');
  items.forEach(p=>attachEvents(p.id));
}

function cardTpl(p){
  return `
  <div class="card" data-cat="${p.cat}" data-id="${p.id}">
    <div class="stripe"></div>
    <div class="photo-box" data-action="photo" data-id="${p.id}">
      ${p.photoUrl ? `<img src="${p.photoUrl}">` : 'Фото қосу / Добавить фото'}
    </div>
    <div class="card-body">
      <div class="name-row">
        <div class="field"><label>ҚАЗ атауы</label><input data-field="nameKz" value="${escapeHtml(p.nameKz)}"></div>
        <div class="field"><label>РУС название</label><input data-field="nameRu" value="${escapeHtml(p.nameRu)}"></div>
      </div>
      <div class="num-row">
        <div class="field price-field"><label>Бағасы ₸</label><input type="number" data-field="price" value="${p.price}"></div>
        <div class="field"><label>Саны</label><input type="number" data-field="qty" value="${p.qty}"></div>
      </div>
      <div class="field"><label>Сапасы / матасы</label><input data-field="quality" value="${escapeHtml(p.quality)}"></div>
      <div class="field"><label>Размер</label><input data-field="size" value="${escapeHtml(p.size)}"></div>
      <div class="foot">
        <select class="sub-select" data-field="sub">${subOptions(p.cat, p.sub)}</select>
        <button class="del-btn" data-action="del" data-id="${p.id}">✕</button>
      </div>
    </div>
  </div>`;
}

function attachEvents(id){
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const p = PRODUCTS.find(x=>x.id===id);
  card.querySelectorAll('[data-field]').forEach(el=>{
    const evt = el.tagName==='SELECT' ? 'change' : 'input';
    el.addEventListener(evt, debounce(async ()=>{
      const field = el.dataset.field;
      p[field] = (field==='price'||field==='qty') ? Number(el.value||0) : el.value;
      await api('/api/products/'+p.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(p) });
      flash();
      if(field==='sub'){ renderAll(); }
    }, 400));
  });
  card.querySelector('[data-action="photo"]').addEventListener('click', ()=>{
    editingId = id;
    document.getElementById('hiddenPhotoInput').click();
  });
  card.querySelector('[data-action="del"]').addEventListener('click', async ()=>{
    if(!confirm('Өшіру керек пе? / Удалить?')) return;
    await api('/api/products/'+id, { method:'DELETE' });
    PRODUCTS = PRODUCTS.filter(x=>x.id!==id);
    renderAll();
  });
}

function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

document.getElementById('hiddenPhotoInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file || !editingId) return;
  const fd = new FormData();
  fd.append('photo', file);
  const res = await api('/api/upload', { method:'POST', body: fd });
  const data = await res.json();
  const p = PRODUCTS.find(x=>x.id===editingId);
  p.photoUrl = data.url;
  await api('/api/products/'+p.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(p) });
  renderGrid();
  flash();
  e.target.value = '';
});

document.getElementById('addBtn').addEventListener('click', async ()=>{
  const sub = state.sub==='all' ? META.SUBCATS[state.cat][0].id : state.sub;
  const res = await api('/api/products', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ cat: state.cat, sub, nameKz:'', nameRu:'', price:0, quality:'', qty:1, size:'', photoUrl:'' }) });
  const np = await res.json();
  PRODUCTS.unshift(np);
  renderAll();
});
</script>
</body>
</html>
